{% extends "base.html" %}

{% block title %}ExEx - Configuración{% endblock %}

{% block content %}
<section class="setup-container">
    <div class="game-logo">
        <p class="subtitle">El juego de palabras y expresiones</p>
    </div>

    <div class="setup-form">
        <h3>Configuración del Juego</h3>

        <form id="setup-form" method="POST" action="{{ url_for('game.setup') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="team1_name">Equipo 1:</label>
                <input type="text" id="team1_name" name="team1_name" placeholder="Nombre del equipo 1" required maxlength="20" value="Azul">
            </div>

            <div class="form-group">
                <label for="team2_name">Equipo 2:</label>
                <input type="text" id="team2_name" name="team2_name" placeholder="Nombre del equipo 2" required maxlength="20" value="Rojo">
            </div>

            <div class="form-group">
                <label for="points_to_win">Puntos para Ganar:</label>
                <div class="range-container">
                    <input type="range" id="points_to_win" name="points_to_win" min="3" max="20" value="10" step="1">
                    <span id="points-value">10 puntos</span>
                </div>
            </div>

            <div class="form-group">
                <label for="timer_min">Temporizador Mínimo (segundos):</label>
                <div class="range-container">
                    <input type="range" id="timer_min" name="timer_min" min="10" max="45" value="30" step="5">
                    <span id="timer-min-value">30 segundos</span>
                </div>
            </div>

            <div class="form-group">
                <label for="timer_max">Temporizador Máximo (segundos):</label>
                <div class="range-container">
                    <input type="range" id="timer_max" name="timer_max" min="45" max="120" value="90" step="5">
                    <span id="timer-max-value">90 segundos</span>
                </div>
            </div>

            <div class="form-group">
                <label for="beep_mode">Modo de Pitidos:</label>
                <div class="radio-container">
                    <div class="radio-option">
                        <input type="radio" id="beep_mode_standard" name="beep_mode" value="standard" checked>
                        <label for="beep_mode_standard">Estándar (intervalos fijos)</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="beep_mode_aggressive" name="beep_mode" value="aggressive">
                        <label for="beep_mode_aggressive">Agresivo (pitidos acelerados)</label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" id="start-game-btn" class="btn btn-primary">¡Comenzar Juego!</button>
                <a href="{{ url_for('game.index') }}" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </div>

</section>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const pointsToWin = document.getElementById('points_to_win');
    const pointsValue = document.getElementById('points-value');

    // Update points display
    pointsToWin.addEventListener('input', function() {
        pointsValue.textContent = `${this.value} puntos`;
    });

    // Timer range controls
    const timerMin = document.getElementById('timer_min');
    const timerMax = document.getElementById('timer_max');
    const timerMinValue = document.getElementById('timer-min-value');
    const timerMaxValue = document.getElementById('timer-max-value');

    // Update timer values
    timerMin.addEventListener('input', function() {
        timerMinValue.textContent = `${this.value} segundos`;
        // Ensure min doesn't exceed max
        if (parseInt(timerMin.value) > parseInt(timerMax.value)) {
            timerMax.value = timerMin.value;
            timerMaxValue.textContent = `${timerMax.value} segundos`;
        }
    });

    timerMax.addEventListener('input', function() {
        timerMaxValue.textContent = `${this.value} segundos`;
        // Ensure max isn't less than min
        if (parseInt(timerMax.value) < parseInt(timerMin.value)) {
            timerMin.value = timerMax.value;
            timerMinValue.textContent = `${timerMin.value} segundos`;
        }
    });

    // Beep mode selection
    const beepModeStandard = document.getElementById('beep_mode_standard');
    const beepModeAggressive = document.getElementById('beep_mode_aggressive');

    // Add visual feedback when selecting beep modes
    beepModeStandard.addEventListener('change', function() {
        if (this.checked) {
            document.querySelector('label[for="beep_mode_standard"]').classList.add('selected');
            document.querySelector('label[for="beep_mode_aggressive"]').classList.remove('selected');
        }
    });

    beepModeAggressive.addEventListener('change', function() {
        if (this.checked) {
            document.querySelector('label[for="beep_mode_aggressive"]').classList.add('selected');
            document.querySelector('label[for="beep_mode_standard"]').classList.remove('selected');
        }
    });

    // Set initial selection
    if (beepModeStandard.checked) {
        document.querySelector('label[for="beep_mode_standard"]').classList.add('selected');
    } else if (beepModeAggressive.checked) {
        document.querySelector('label[for="beep_mode_aggressive"]').classList.add('selected');
    }
});
</script>
{% endblock %}
