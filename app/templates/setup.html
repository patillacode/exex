{% extends "base.html" %}

{% block title %}ExEx - Configuración{% endblock %}

{% block content %}
<section class="setup-container">
    <div class="game-logo">
        <p class="subtitle">El juego de palabras y expresiones</p>
    </div>

    <div class="setup-form">
        <h3>Configuración del Juego</h3>

        <form id="setup-form" method="POST" action="{{ url_for('game.setup') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="team1_name">Equipo 1:</label>
                <input type="text" id="team1_name" name="team1_name" placeholder="Nombre del equipo 1" required maxlength="20" value="Azul">
            </div>

            <div class="form-group">
                <label for="team2_name">Equipo 2:</label>
                <input type="text" id="team2_name" name="team2_name" placeholder="Nombre del equipo 2" required maxlength="20" value="Rojo">
            </div>

            <div class="form-group">
                <label for="points_to_win">Puntos para Ganar:</label>
                <div class="range-container">
                    <input type="range" id="points_to_win" name="points_to_win" min="3" max="20" value="10" step="1">
                    <span id="points-value">10 puntos</span>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" id="start-game-btn" class="btn btn-primary">¡Comenzar Juego!</button>
                <a href="{{ url_for('game.index') }}" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </div>

</section>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const pointsToWin = document.getElementById('points_to_win');
    const pointsValue = document.getElementById('points-value');

    // Update points display
    pointsToWin.addEventListener('input', function() {
        pointsValue.textContent = `${this.value} puntos`;
    });
});
</script>
{% endblock %}
