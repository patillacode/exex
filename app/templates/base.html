<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Expresión Exprés - Un juego de palabras y expresiones">
    <title>{% block title %}Expresión Exprés{% endblock %}</title>
    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <!-- Base CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
    <!-- Preload audio files -->
    <link rel="preload" href="{{ url_for('static', filename='sounds/beep.mp3') }}" as="fetch" crossorigin>
    <link rel="preload" href="{{ url_for('static', filename='sounds/buzzer.mp3') }}" as="fetch" crossorigin>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="app-title">{% block header %}Expresión Exprés{% endblock %}</h1>
        </header>
        
        <main>
            <div id="app-container">
                {% block content %}{% endblock %}
            </div>
        </main>
        
        <footer>
            <div class="footer-content">
                <p>© {{ now().year }} Expresión Exprés</p>
            </div>
        </footer>
    </div>

    <!-- Base JavaScript -->
    <script type="module" src="{{ url_for('static', filename='js/game.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
