services:
  web:
    build: .
    container_name: exex
    restart: unless-stopped
    labels:
      - "kuma.exex.http.name=ExEx"
      - "kuma.exex.http.url=http://192.168.1.2:5054"
      - "kuma.exex.http.tag_names=[{\"name\":\"misc\"}]"
      - "homepage.group=Personal Projects"
      - "homepage.name=exex"
      - "homepage.icon=mdi-alphabetical"
      - "homepage.href=https://exex.patilla.es"
      - "homepage.description=Spanish word-guessing party game"
      - "homepage.showStats=true"
      - "homepage.ping=http://192.168.1.2:5054"

    ports:
      - "${PORT:-5054}:${PORT:-5054}"

    env_file:
      - .env

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os; urllib.request.urlopen(f'http://localhost:{os.environ.get(\"PORT\",5054)}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"